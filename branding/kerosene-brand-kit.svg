<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kerosene SVG brand kit overview</title>
  <desc id="desc">A flat orange SVG overview with the simple Kerosene K mark, wordmark, and palette.</desc>

  <rect width="1600" height="1000" fill="#FF5A00"/>

  <text x="120" y="130" fill="#050505" font-family="Inter, Satoshi, Avenir Next, Arial, sans-serif" font-size="48" font-weight="800">KEROSENE</text>
  <text x="120" y="182" fill="#050505" font-family="Inter, Satoshi, Avenir Next, Arial, sans-serif" font-size="22" font-weight="600">SVG BRAND KIT</text>

  <rect x="160" y="305" width="110" height="430" fill="#050505"/>
  <polygon points="270,500 480,305 620,305 360,540" fill="#050505"/>
  <polygon points="270,540 620,735 474,735 270,620" fill="#050505"/>

  <text x="760" y="555" fill="#050505" font-family="Inter, Satoshi, Avenir Next, Arial, sans-serif" font-size="108" font-weight="800">KEROSENE</text>

  <text x="120" y="850" fill="#050505" font-family="Inter, Satoshi, Avenir Next, Arial, sans-serif" font-size="24" font-weight="700">COLORS</text>
  <rect x="120" y="880" width="120" height="60" fill="#FF5A00" stroke="#050505" stroke-width="4"/>
  <text x="270" y="920" fill="#050505" font-family="Inter, Satoshi, Avenir Next, Arial, sans-serif" font-size="20" font-weight="600">#FF5A00</text>
  <rect x="460" y="880" width="120" height="60" fill="#050505"/>
  <text x="610" y="920" fill="#050505" font-family="Inter, Satoshi, Avenir Next, Arial, sans-serif" font-size="20" font-weight="600">#050505</text>
</svg>
