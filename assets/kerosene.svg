<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="32" fill="#181825"/>
  <rect x="24" y="24" width="208" height="208" rx="16" fill="#1e1e2e"/>
  <!-- Candlestick bars -->
  <!-- Green candle 1 -->
  <rect x="52" y="100" width="2" height="80" fill="#50fa7b"/>
  <rect x="44" y="120" width="18" height="40" rx="2" fill="#50fa7b"/>
  <!-- Red candle 2 -->
  <rect x="92" y="60" width="2" height="100" fill="#ff5555"/>
  <rect x="84" y="70" width="18" height="50" rx="2" fill="#ff5555"/>
  <!-- Green candle 3 -->
  <rect x="132" y="50" width="2" height="110" fill="#50fa7b"/>
  <rect x="124" y="70" width="18" height="60" rx="2" fill="#50fa7b"/>
  <!-- Red candle 4 -->
  <rect x="172" y="80" width="2" height="80" fill="#ff5555"/>
  <rect x="164" y="90" width="18" height="40" rx="2" fill="#ff5555"/>
  <!-- Green candle 5 -->
  <rect x="212" y="40" width="2" height="100" fill="#50fa7b"/>
  <rect x="204" y="55" width="18" height="50" rx="2" fill="#50fa7b"/>
  <!-- Price line -->
  <line x1="24" y1="75" x2="232" y2="75" stroke="#50fa7b" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Text "S" -->
  <text x="128" y="220" font-family="monospace" font-size="36" font-weight="bold" fill="#50fa7b" text-anchor="middle">KEROSENE</text>
</svg>
