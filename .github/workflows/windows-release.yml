name: Windows Release

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Format
        run: cargo fmt -- --check

      - name: Check
        run: cargo check --target x86_64-pc-windows-msvc

      - name: Clippy
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings

      - name: Compile tests
        run: cargo test --target x86_64-pc-windows-msvc --no-run

      - name: Package unsigned Windows artifacts
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: ./scripts/package-windows.ps1 -SkipSigning

      - name: Package signed Windows artifacts
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: ./scripts/package-windows.ps1 -Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kerosene-windows-x64
          path: |
            target/windows-dist/*.zip
            target/windows-dist/*.msi
            target/windows-dist/SHA256SUMS.txt
